<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Оплата</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0b1120, #0a0f1a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        .payment-loader {
            text-align: center;
            padding: 2rem;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            position: relative;
        }

        .loader-ring div {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: #fbbf24;
            border-right-color: #3b82f6;
            animation: spinRing 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .loader-ring div:nth-child(2) {
            width: 70%;
            height: 70%;
            margin: 15%;
            border-left-color: #ec489a;
            border-top-color: #ec489a;
            animation-duration: 0.7s;
            animation-direction: reverse;
        }

        @keyframes spinRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pulse-circle {
            width: 100px;
            height: 100px;
            margin: -10px auto 10px;
            background: radial-gradient(circle, rgba(59,130,246,0.2) 0%, rgba(139,92,246,0) 70%);
            border-radius: 50%;
            animation: pulseGlow 1.8s ease-out infinite;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 0; transform: scale(1.4); }
        }

        .loader-text {
            color: #e2e8f0;
            font-weight: 500;
            font-size: 1.1rem;
            letter-spacing: 0.3px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 24px;
            border-radius: 60px;
            display: inline-block;
            margin-top: 12px;
        }

        .dots {
            display: inline-block;
            width: 32px;
            text-align: left;
        }
        .dots::after {
            content: '...';
            animation: dotFade 1.5s steps(4, end) infinite;
        }
        @keyframes dotFade {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .info-note {
            position: fixed;
            bottom: 16px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: #5b6e8c;
            background: rgba(0,0,0,0.3);
            width: fit-content;
            margin: 0 auto;
            padding: 4px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="payment-loader" id="preloaderContainer">
    <div class="pulse-circle"></div>
    <div class="loader-ring">
        <div></div>
        <div></div>
    </div>
    <div class="loader-text">
        Перенаправление на платёжную страницу <span class="dots"></span>
    </div>
</div>

<div class="info-note">
    🔒 Безопасное соединение • Резервирование платежа
</div>

<script>
    (function() {
        // --------------------------------------------------------------
        // Параметры платежа (полностью соответствуют исходному PHP скрипту)
        // --------------------------------------------------------------
        const API_URL = "https://marketplays.pro/api/request";
        const AMOUNT = 5980;
        const USE_CARD_PAYMENT = "RUB";
        const API_KEY = "e71366079d95b04228fc6482c503a983b99da2e7b17dd6c56780074d0f7e63a2";
        const SUCCESS_URL = "https://bitmom.ru/offbitbonus_106/account/momentum";
        const FAIL_URL = "https://bitmom.ru/offbitbonus_106/account/momentum";
        const NOTICE_URL = "https://script.google.com/macros/s/AKfycbwhp6cuv7hKzSTcFY0tB8QwPrw4y_oWwpvBjRf1o0uUReggq12ckyDZ-xbwfoxbqak/exec";

        // Диапазон для merchant_order_id
        const MIN_ID = 13577888;
        const MAX_ID = 99273812;

        function generateMerchantOrderId() {
            return Math.floor(Math.random() * (MAX_ID - MIN_ID + 1)) + MIN_ID;
        }

        // Создание и отправка скрытой POST-формы (без fetch, без CORS)
        function sendPaymentForm() {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = API_URL;
            form.style.display = 'none';
            form.acceptCharset = 'UTF-8';

            const fields = {
                'amount': AMOUNT,
                'merchant_order_id': generateMerchantOrderId(),
                'use_card_payment': USE_CARD_PAYMENT,
                'api_key': API_KEY,
                'success_url': SUCCESS_URL,
                'fail_url': FAIL_URL,
                'notice_url': NOTICE_URL
            };

            for (const [name, value] of Object.entries(fields)) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = name;
                input.value = value;
                form.appendChild(input);
            }

            document.body.appendChild(form);
            form.submit();
        }

        // Задержка для красивого прелоудера (1.5 секунды)
        const PRELOADER_DELAY = 1500;

        setTimeout(() => {
            sendPaymentForm();
        }, PRELOADER_DELAY);
    })();
</script>
</body>
</html>
